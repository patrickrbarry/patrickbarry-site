<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="white"/>

  <!-- Each petal: a full round clover leaf meeting at a soft notch at centre -->
  <!-- Petals drawn slightly overlapping so they feel connected organically    -->

  <!-- TOP petal -->
  <path d="M50 53
           C47 53 33 49 33 35
           C33 20 41 13 50 13
           C59 13 67 20 67 35
           C67 49 53 53 50 53 Z"
        fill="white" stroke="black" stroke-width="2.6"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- BOTTOM petal -->
  <path d="M50 47
           C53 47 67 51 67 65
           C67 80 59 87 50 87
           C41 87 33 80 33 65
           C33 51 47 47 50 47 Z"
        fill="white" stroke="black" stroke-width="2.6"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- LEFT petal -->
  <path d="M53 50
           C53 47 49 33 35 33
           C20 33 13 41 13 50
           C13 59 20 67 35 67
           C49 67 53 53 53 50 Z"
        fill="white" stroke="black" stroke-width="2.6"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- RIGHT petal -->
  <path d="M47 50
           C47 53 51 67 65 67
           C80 67 87 59 87 50
           C87 41 80 33 65 33
           C51 33 47 47 47 50 Z"
        fill="white" stroke="black" stroke-width="2.6"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ── VEINS — organic, slightly curved ── -->
  <!-- Top -->
  <path d="M50 51 C50 43 49 30 50 15" fill="none" stroke="black" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M50 36 C46 30 42 25 40 21"  fill="none" stroke="black" stroke-width="0.9" stroke-linecap="round"/>
  <path d="M50 36 C54 30 58 25 60 21"  fill="none" stroke="black" stroke-width="0.9" stroke-linecap="round"/>

  <!-- Bottom -->
  <path d="M50 49 C50 57 51 70 50 85" fill="none" stroke="black" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M50 64 C46 70 42 75 40 79"  fill="none" stroke="black" stroke-width="0.9" stroke-linecap="round"/>
  <path d="M50 64 C54 70 58 75 60 79"  fill="none" stroke="black" stroke-width="0.9" stroke-linecap="round"/>

  <!-- Left -->
  <path d="M49 50 C41 50 28 49 15 50" fill="none" stroke="black" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M34 50 C28 46 23 43 20 40"  fill="none" stroke="black" stroke-width="0.9" stroke-linecap="round"/>
  <path d="M34 50 C28 54 23 57 20 60"  fill="none" stroke="black" stroke-width="0.9" stroke-linecap="round"/>

  <!-- Right -->
  <path d="M51 50 C59 50 72 51 85 50" fill="none" stroke="black" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M66 50 C72 46 77 43 80 40"  fill="none" stroke="black" stroke-width="0.9" stroke-linecap="round"/>
  <path d="M66 50 C72 54 77 57 80 60"  fill="none" stroke="black" stroke-width="0.9" stroke-linecap="round"/>

  <!-- ── STEM (slightly curved, naturalistic) ── -->
  <path d="M50 50 C52 60 51 72 50 88"
        fill="none" stroke="black" stroke-width="2.4" stroke-linecap="round"/>
</svg>
